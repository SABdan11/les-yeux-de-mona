<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Yeux de Mona — Par époque</title>
  <link rel="stylesheet" href="css/style.css">
  <style>

    .chron-header {
      background: linear-gradient(160deg, #2c1a5c, #4a2a8c);
      color: white;
      padding: 20px 20px 16px;
    }
    .chron-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .chron-header p { font-size: 13px; opacity: 0.7; }

    /* Ligne de temps verticale */
    .timeline {
      padding: 24px 20px;
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 35px;
      top: 24px;
      bottom: 24px;
      width: 2px;
      background: #e0d8ce;
    }

    /* Période */
    .periode {
      position: relative;
      margin-bottom: 32px;
    }

    /* Point sur la timeline */
    .periode-dot {
      position: absolute;
      left: -20px;
      top: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c9a84c;
      border: 2px solid white;
      box-shadow: 0 0 0 2px #c9a84c;
      z-index: 1;
    }

    .periode-content {
      margin-left: 36px;
    }

    /* En-tête de période */
    .periode-header {
      margin-bottom: 12px;
    }

    .periode-dates {
      font-size: 11px;
      font-weight: 600;
      color: #c9a84c;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .periode-nom {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 4px;
    }

    .periode-ideal {
      font-size: 12px;
      color: #888;
      font-style: italic;
      line-height: 1.4;
    }

    /* Œuvres de la période */
    .periode-oeuvres {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Carte œuvre compacte */
    .chron-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.15s;
    }

    .chron-card:active { transform: scale(0.98); }

    .chron-card.locked {
      opacity: 0.4;
      pointer-events: none;
    }

    .chron-img {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      overflow: hidden;
      background: #e8e0d4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chron-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .chron-info { flex: 1; padding: 10px 0; }

    .chron-artiste {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .chron-titre {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
      line-height: 1.3;
    }

    .chron-musee {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
    }

    .chron-arrow {
      font-size: 18px;
      color: #ddd;
      padding-right: 12px;
    }

    /* Badge "à venir" */
    .badge-avenir {
      font-size: 10px;
      background: #f0ece6;
      color: #aaa;
      border-radius: 4px;
      padding: 2px 6px;
      margin-top: 4px;
      display: inline-block;
    }

    /* Période sans œuvres disponibles */
    .periode-vide {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      padding: 8px 0;
    }

    /* Frise synthétique */
    .frise-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      user-select: none;
    }
    .frise-toggle-titre {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: #1a3a5c;
    }
    .frise-toggle-icon {
      font-size: 18px;
      color: #c9a84c;
      transition: transform 0.3s;
    }
    .frise-toggle-icon.open { transform: rotate(180deg); }

    .frise-table-wrap {
      display: none;
      overflow-x: auto;
      background: #fafafa;
      border-bottom: 2px solid #c9a84c;
    }
    .frise-table-wrap.open { display: block; }

    .frise-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      table-layout: fixed;
    }
    .frise-table col.col-periode  { width: 22%; }
    .frise-table col.col-artistes { width: 28%; }
    .frise-table col.col-ideal    { width: 50%; }
    .frise-table thead th {
      background: #1a3a5c;
      color: white;
      padding: 7px 8px;
      text-align: left;
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .frise-table tbody tr {
      border-bottom: 1px solid #ede8e0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .frise-table tbody tr:hover { background: #f4f0ea; }
    .frise-table tbody tr:last-child { border-bottom: none; }
    .frise-table td {
      padding: 6px 7px;
      vertical-align: top;
      line-height: 1.4;
      word-break: break-word;
    }
    .frise-table .frise-dates {
      font-size: 9px;
      color: #c9a84c;
      font-weight: 700;
      display: block;
      margin-bottom: 1px;
    }
    .frise-table .frise-nom { color: #1a3a5c; font-weight: 700; font-size: 11px; }
    .frise-table .frise-artistes { color: #666; font-size: 10px; }
    .frise-table .frise-ideal { color: #888; font-size: 10px; font-style: italic; }

  </style>
</head>
<body>

  <header class="chron-header">
    <a href="index.html" class="back-btn">‹ Accueil</a>
    <h1>📅 Par époque</h1>
    <p>La grande frise de l'histoire de l'art</p>
  </header>

  <!-- FRISE SYNTHÉTIQUE DÉPLIABLE -->
  <div class="frise-toggle" id="friseToggle" onclick="toggleFrise()">
    <span class="frise-toggle-titre">📋 La frise de l'histoire de l'art</span>
    <span class="frise-toggle-icon" id="friseIcon">▼</span>
  </div>
  <div class="frise-table-wrap" id="friseTableWrap">
    <table class="frise-table">
      <colgroup>
        <col class="col-periode">
        <col class="col-artistes">
        <col class="col-ideal">
      </colgroup>
      <thead>
        <tr>
          <th>Période</th>
          <th>Artistes</th>
          <th>Idéal esthétique</th>
        </tr>
      </thead>
      <tbody id="friseTableBody"></tbody>
    </table>
  </div>

  <div class="timeline" id="timeline"></div>

  <script src="js/profil.js"></script>
  <script src="js/nav.js"></script>
  <script src="data/oeuvres.js"></script>
  <script>

    const museeNoms = {
      louvre:   'Louvre',
      orsay:    'Orsay',
      pompidou: 'Pompidou'
    };

    // Toggle frise
    function toggleFrise() {
      const wrap = document.getElementById('friseTableWrap');
      const icon = document.getElementById('friseIcon');
      wrap.classList.toggle('open');
      icon.classList.toggle('open');
    }

    // Toutes les périodes dans l'ordre chronologique
    const PERIODES = [
      {
        id: 'periode-0',
        dates: 'XVe – XVIe siècle',
        nom: 'Renaissance Italienne',
        ideal: 'Humanisme triomphant, redécouverte de l\'Antiquité gréco-romaine, rigueur mathématique de la perspective linéaire et harmonie divine.',
        artistes: ['Botticelli', 'De Vinci', 'Raphaël', 'Titien', 'Michel-Ange']
      },
      { id:'periode-1', dates: 'XVIIe siècle', nom: 'Âge d\'or Hollandais', ideal: 'Valorisation de la vie quotidienne bourgeoise, intimité domestique, étude psychologique et maîtrise du clair-obscur.', artistes: ['Frans Hals', 'Rembrandt', 'Vermeer'] },
      { id:'periode-2', dates: 'XVIIe siècle', nom: 'Classicisme & Baroque', ideal: 'Ordre souverain de la raison géométrique, rigueur morale janséniste et méditation poétique sur la condition mortelle.', artistes: ['Poussin', 'Champaigne'] },
      { id:'periode-3', dates: 'XVIIIe siècle', nom: 'Rococo & Siècle des Lumières', ideal: 'Fêtes galantes, élégance mondaine et insouciante, précision géographique et émancipation par le savoir.', artistes: ['Watteau', 'Canaletto', 'Gainsborough', 'Marguerite Gérard'] },
      { id:'periode-4', dates: '1780 – 1850', nom: 'Néoclassicisme & Romantisme', ideal: 'Héroïsme patriotique, dignité morale civique, puis basculement vers le triomphe de la passion intérieure et de la nature sublime.', artistes: ['David', 'Benoist', 'Friedrich', 'Turner'] },
      { id:'periode-5', dates: 'Milieu XIXe siècle', nom: 'Réalisme', ideal: 'Peinture brute et franche de la condition humaine populaire et des provinces, sans aucune idéalisation académique.', artistes: ['Courbet', 'Rosa Bonheur'] },
      { id:'periode-6', dates: '1870 – 1900', nom: 'Impressionnisme & Post-Impressionnisme', ideal: 'Recherche sur le motif en plein air, fugacité des conditions de lumière, fragmentation de la touche et libération de la couleur.', artistes: ['Manet', 'Monet', 'Degas', 'Cézanne', 'Van Gogh'] },
      { id:'periode-7', dates: '1880 – 1910', nom: 'Symbolisme & Transition', ideal: 'Exploration des paysages intérieurs de l\'âme, allégories métaphysiques existentielles et acheminement vers la pureté géométrique.', artistes: ['Burne-Jones', 'Claudel', 'Klimt', 'Hammershøi', 'Mondrian'] },
      { id:'periode-8', dates: 'Première moitié XXe s.', nom: 'Avant-Gardes & Abstraction', ideal: 'Rupture totale avec l\'illusionnisme figuratif, subversion des objets du quotidien, surréalisme et conceptualisation radicale.', artistes: ['Kandinsky', 'Duchamp', 'Malévitch', 'O\'Keeffe', 'Magritte', 'Brancusi', 'Picasso'] },
      { id:'periode-9', dates: 'Milieu XXe siècle', nom: 'Expressionnisme Abstrait', ideal: 'Geste physique pur et viscéral, sacralisation du support, libération immédiate de l\'énergie émotive de l\'artiste.', artistes: ['Pollock', 'Hartung', 'Bergman', 'Joan Mitchell'] },
      { id:'periode-10', dates: 'Fin XXe – XXIe siècle', nom: 'Art Contemporain', ideal: 'Installations mémorielles et immersives, combat féministe et identitaire, mythologies personnelles et quête de l\'Outrenoir absolu.', artistes: ['Niki de Saint Phalle', 'Basquiat', 'Louise Bourgeois', 'Abramović', 'Frida Kahlo', 'Boltanski', 'Soulages'] }
    ];

    // Générer le tableau de la frise
    const tbody = document.getElementById('friseTableBody');
    PERIODES.forEach((p, i) => {
      const tr = document.createElement('tr');
      tr.onclick = () => {
        document.getElementById(p.id || 'periode-' + i).scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('friseTableWrap').classList.remove('open');
        document.getElementById('friseIcon').classList.remove('open');
      };
      tr.innerHTML = `
        <td><span class="frise-dates">${p.dates}</span><span class="frise-nom">${p.nom}</span></td>
        <td><span class="frise-artistes">${p.artistes.join(' · ')}</span></td>
        <td><span class="frise-ideal">${p.ideal}</span></td>`;
      tbody.appendChild(tr);
    });

    const timeline = document.getElementById('timeline');

    PERIODES.forEach(periode => {
      // Cherche les œuvres disponibles dont le frise_titre contient le nom de la période
      const oeuvresDispos = OEUVRES.filter(o =>
        o.frise_titre.toLowerCase().includes(periode.nom.split('&')[0].trim().toLowerCase()) ||
        periode.artistes.some(a => o.artiste.toLowerCase().includes(a.toLowerCase()))
      );

      let oeuvresHTML = '';

      // Œuvres disponibles
      oeuvresDispos.forEach(o => {
        oeuvresHTML += `
          <a href="fiche.html?id=${o.id}" class="chron-card">
            <div class="chron-img">
              <img src="${o.image}" alt="${o.titre}" onerror="this.parentElement.innerHTML='🖼️'">
            </div>
            <div class="chron-info">
              <div class="chron-artiste">${o.artiste}</div>
              <div class="chron-titre">${o.titre}</div>
              <div class="chron-musee">${museeNoms[o.musee]} · ${o.date}</div>
            </div>
            <div class="chron-arrow">›</div>
          </a>`;
      });

      // Artistes sans fiche encore
      const artistesSansData = periode.artistes.filter(a =>
        !oeuvresDispos.some(o => o.artiste.toLowerCase().includes(a.toLowerCase()))
      );

      artistesSansData.forEach(a => {
        oeuvresHTML += `
          <div class="chron-card locked">
            <div class="chron-img">🖼️</div>
            <div class="chron-info">
              <div class="chron-artiste">${a}</div>
              <div class="badge-avenir">Fiche à venir</div>
            </div>
          </div>`;
      });

      timeline.innerHTML += `
        <div class="periode" id="${periode.id || 'periode-' + PERIODES.indexOf(periode)}">
          <div class="periode-dot"></div>
          <div class="periode-content">
            <div class="periode-header">
              <div class="periode-dates">${periode.dates}</div>
              <div class="periode-nom">${periode.nom}</div>
              <div class="periode-ideal">${periode.ideal}</div>
            </div>
            <div class="periode-oeuvres">${oeuvresHTML}</div>
          </div>
        </div>`;
    });

  </script>
</body>
</html>
